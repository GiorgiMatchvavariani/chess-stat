<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chess Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


    <h1>Chess Dashboard</h1>



    <div class="controls">


        <input 
            id="player"
            type="text"
            placeholder="Chess.com username"
        >



        <select id="gameType">

            <option value="bullet">
                Bullet
            </option>

            <option value="blitz" selected>
                Blitz
            </option>

            <option value="rapid">
                Rapid
            </option>

        </select>




        <select id="date">


            <option value="today">
                Today
            </option>


            <option value="yesterday">
                Yesterday
            </option>


            <option value="custom">
                Custom Date
            </option>


            <option value="session">
                From Now
            </option>


        </select>




        <input
            id="customDate"
            type="date"
            style="display:none;"
        >



        <button id="searchBtn">
            Update
        </button>


    </div>





    <div class="status">


        <span id="connection">
            ● Waiting
        </span>


        <span id="lastUpdate">
            
        </span>


    </div>







    <div class="dashboard">



        <div class="card">

            <h3>
                Games
            </h3>

            <strong id="games">
                0
            </strong>

        </div>





        <div class="card">

            <h3>
                Wins
            </h3>

            <strong id="wins">
                0
            </strong>

        </div>





        <div class="card">

            <h3>
                Losses
            </h3>

            <strong id="losses">
                0
            </strong>

        </div>





        <div class="card">

            <h3>
                Draws
            </h3>

            <strong id="draws">
                0
            </strong>

        </div>





        <div class="card">

            <h3>
                Rating
            </h3>

            <strong id="rating">
                0
            </strong>

        </div>





        <div class="card">

            <h3>
                Accuracy
            </h3>

            <strong id="accuracy">
                N/A
            </strong>

        </div>



    </div>







    <div class="games-list">


        <h2>
            Saved Games
        </h2>


        <table>


            <thead>

                <tr>

                    <th>
                        Date
                    </th>


                    <th>
                        Opponent
                    </th>


                    <th>
                        Result
                    </th>


                    <th>
                        Rating
                    </th>


                    <th>
                        Accuracy
                    </th>


                </tr>


            </thead>



            <tbody id="gamesTable">


            </tbody>


        </table>


    </div>





</div>




<script src="script.js"></script>


</body>

</html>
